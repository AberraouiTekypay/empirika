version: '3.9'

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: empirika-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      - GCP_KEY_FILE=/run/secrets/gcp_key
      - BIGQUERY_DATASET=${BIGQUERY_DATASET:-empirika}
      - BIGQUERY_LOCATION=${BIGQUERY_LOCATION:-US}
      - YOUTUBE_CLIENT_ID=${YOUTUBE_CLIENT_ID}
      - YOUTUBE_CLIENT_SECRET=${YOUTUBE_CLIENT_SECRET}
      - YOUTUBE_REDIRECT_URI=${YOUTUBE_REDIRECT_URI:-http://localhost:5000/auth/callback}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - TIKTOK_API_KEY=${TIKTOK_API_KEY:-}
      - REDDIT_CLIENT_ID=${REDDIT_CLIENT_ID:-}
      - REDDIT_CLIENT_SECRET=${REDDIT_CLIENT_SECRET:-}
      - REDDIT_USER_AGENT=${REDDIT_USER_AGENT:-empirika-bot/1.0}
      - ADMIN_SECRET=${ADMIN_SECRET}
      - FRONTEND_URL=http://localhost:3000
    volumes:
      - ./backend/credentials:/app/credentials
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: empirika-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      - GCP_KEY_FILE=/run/secrets/gcp_key
      - BIGQUERY_DATASET=${BIGQUERY_DATASET:-empirika}
      - BIGQUERY_LOCATION=${BIGQUERY_LOCATION:-US}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - BACKEND_URL=http://backend:5000
      - ADMIN_SECRET=${ADMIN_SECRET}
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    volumes:
      - ./backend/gcp-key.json:/run/secrets/gcp_key:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
